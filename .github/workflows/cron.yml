name: Cron to rebuild latest

on:
  workflow_dispatch:
  schedule:
    # rebuild latest regulary - to resolve CVEs in base images
    - cron: "0 10 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        flavor: ['debian', 'alpine']
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true
          filter: blob:none
          fetch-depth: 0

      - name: Checkout last commit
        id: checkout
        run: |
          LAST_TAG=$(git for-each-ref refs/tags --sort=-authordate --format='%(refname:short)' | grep '^[[:digit:]]*\.[[:digit:]]*\.[[:digit:]]$' | head -n1)
          echo "LAST_TAG: $LAST_TAG"
          echo "tag=$LAST_TAG" >> "$GITHUB_OUTPUT"
          git checkout $LAST_TAG

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          # list of Docker images to use as base name for tags
          images: |
            ghcr.io/${{ github.repository }}
          # add flavor to set latest to false and add those with raw values instead
          flavor: |
            latest=false
            prefix=
            suffix=
          # generate Docker tags based on the following events/attributes
          tags: |
            type=schedule
            type=raw,value=latest,enable=${{matrix.flavor == 'debian'}}
            type=raw,value=latest-${{matrix.flavor}}
            type=semver,pattern={{version}},value=${{ steps.checkout.outputs.tag }},enable=${{matrix.flavor == 'debian'}}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.checkout.outputs.tag }},enable=${{matrix.flavor == 'debian'}}
            type=semver,pattern={{major}},value=${{ steps.checkout.outputs.tag }},enable=${{matrix.flavor == 'debian'}}
            type=semver,pattern={{version}}-${{matrix.flavor}},value=${{ steps.checkout.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}}-${{matrix.flavor}},value=${{ steps.checkout.outputs.tag }}
            type=semver,pattern={{major}}-${{matrix.flavor}},value=${{ steps.checkout.outputs.tag }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Resolve base image digests
        id: base-digests
        run: |
          if [ "${{ matrix.flavor }}" = "alpine" ]; then
            BUILDER_IMAGE="rust:alpine"
            RUNTIME_IMAGE="alpine:latest"
          else
            BUILDER_IMAGE="rust:bookworm"
            RUNTIME_IMAGE="debian:bookworm-slim"
          fi

          BUILDER_DIGEST=$(docker buildx imagetools inspect "$BUILDER_IMAGE" --format '{{.Manifest.Digest}}')
          RUNTIME_DIGEST=$(docker buildx imagetools inspect "$RUNTIME_IMAGE" --format '{{.Manifest.Digest}}')

          echo "builder=$BUILDER_DIGEST" >> "$GITHUB_OUTPUT"
          echo "runtime=$RUNTIME_DIGEST" >> "$GITHUB_OUTPUT"
          echo "Builder digest: $BUILDER_DIGEST"
          echo "Runtime digest: $RUNTIME_DIGEST"

      - name: Check if base images changed since last build
        id: cache
        uses: actions/cache@v5
        with:
          path: .base-image-digest-marker
          key: base-image-digests-${{ matrix.flavor }}-${{ steps.base-digests.outputs.builder }}-${{ steps.base-digests.outputs.runtime }}

      - name: Create digest marker file
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          echo "${{ steps.base-digests.outputs.builder }}" > .base-image-digest-marker
          echo "${{ steps.base-digests.outputs.runtime }}" >> .base-image-digest-marker

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request' && steps.cache.outputs.cache-hit != 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: steps.cache.outputs.cache-hit != 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          file: Containerfile.${{ matrix.flavor }}
          platforms: linux/amd64,linux/arm64/v8${{ matrix.flavor == 'debian' && ',linux/arm/v7' || '' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
